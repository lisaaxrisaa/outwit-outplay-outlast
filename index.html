<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outwit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Bebas Neue"', 'sans-serif'],
              body: ['"Space Grotesk"', 'sans-serif']
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              flicker: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.85' }
              },
              pulseGlow: {
                '0%, 100%': { boxShadow: '0 0 0px rgba(255,130,40,0.2)' },
                '50%': { boxShadow: '0 0 18px rgba(255,130,40,0.45)' }
              }
            },
            animation: {
              fadeIn: 'fadeIn 600ms ease-out',
              flicker: 'flicker 1.6s ease-in-out infinite',
              pulseGlow: 'pulseGlow 2s ease-in-out infinite'
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at top, #1f3b2f 0%, #0c1411 45%, #070908 100%);
      }
      .torch-overlay {
        background: radial-gradient(circle at 50% -20%, rgba(255, 125, 35, 0.22), rgba(0, 0, 0, 0) 60%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.28) 0%, rgba(0, 0, 0, 0.62) 100%);
      }
      .dossier {
        background: linear-gradient(155deg, rgba(14, 20, 18, 0.97) 0%, rgba(9, 12, 11, 0.96) 100%);
      }
      .memory-card {
        perspective: 1000px;
      }
      .memory-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 320ms ease;
      }
      .memory-card-inner.flipped {
        transform: rotateY(180deg);
      }
      .memory-card-face {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
      }
      .memory-card-back {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body class="font-body text-zinc-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
