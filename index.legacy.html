  <body class="font-body text-zinc-100">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const MODEL = 'claude-sonnet-4-20250514';
      const API_ENDPOINT = '/api/anthropic';
      const CHALLENGE_TYPES = ['sliding', 'memory', 'cipher', 'maze', 'jigsaw'];
      const CHALLENGE_META = {
        sliding: { name: 'Sliding Tile', par: 90, intro: 'Nine tiles. One gap. Put order back together before your tribe does it for you.' },
        memory: { name: 'Memory Match', par: 60, intro: 'Read the symbols, trust your memory, and avoid showing panic.' },
        cipher: { name: 'Word Cipher', par: 75, intro: 'Decode the phrase fast. Hesitation costs safety.' },
        maze: { name: 'Maze Navigation', par: 60, intro: 'Find the exit while pressure closes in from every side.' },
        jigsaw: { name: 'Jigsaw Reassembly', par: 90, intro: 'Rebuild the pattern before the clock turns against you.' }
      };

      function randInt(max) {
        return Math.floor(Math.random() * max);
      }

      function pickChallengeType() {
        return CHALLENGE_TYPES[randInt(CHALLENGE_TYPES.length)];
      }

      function isSlidingSolvable(arr) {
        const nums = arr.filter((n) => n !== 0);
        let inv = 0;
        for (let i = 0; i < nums.length; i += 1) {
          for (let j = i + 1; j < nums.length; j += 1) {
            if (nums[i] > nums[j]) inv += 1;
          }
        }
        return inv % 2 === 0;
      }

      function createSlidingBoard() {
        const target = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        let arr = [...target];
        do {
          arr = [...target];
          for (let i = arr.length - 1; i > 0; i -= 1) {
            const j = randInt(i + 1);
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
        } while (!isSlidingSolvable(arr) || arr.every((n, i) => n === target[i]));
        return arr;
      }

      function createMemoryDeck() {
        const symbols = [
          { key: 'torch', icon: '🔥' },
          { key: 'island', icon: '🏝️' },
          { key: 'skull', icon: '💀' },
          { key: 'palm', icon: '🌴' },
          { key: 'wave', icon: '🌊' },
          { key: 'fire', icon: '🕯️' },
          { key: 'map', icon: '🗺️' },
          { key: 'mask', icon: '🎭' }
        ];
        const deck = [...symbols, ...symbols]
          .map((symbol, idx) => ({ id: idx, key: symbol.key, icon: symbol.icon, matched: false, flipped: false }))
          .sort(() => Math.random() - 0.5);
        return deck;
      }

      function encodeCaesar(text, shift) {
        const A = 'A'.charCodeAt(0);
        return text
          .toUpperCase()
          .split('')
          .map((ch) => {
            const code = ch.charCodeAt(0);
            if (code < 65 || code > 90) return ch;
            return String.fromCharCode(((code - A + shift) % 26) + A);
          })
          .join('');
      }

      function createCipherChallenge() {
        const phrases = [
          'THE TRIBE HAS SPOKEN',
          'TRUST IS A WEAPON',
          'OUTWIT OUTPLAY OUTLAST',
          'ALLIANCES SHIFT FAST',
          'KEEP YOUR NAME QUIET'
        ];
        const plain = phrases[randInt(phrases.length)];
        const shift = 1 + randInt(5);
        const encoded = encodeCaesar(plain, shift);
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const revealed = alphabet
          .filter((_, idx) => idx % 2 === 0)
          .map((ch) => {
            const encodedCh = encodeCaesar(ch, shift);
            return `${encodedCh}\u2192${ch}`;
          });
        return { plain, encoded, shift, key: revealed.join('  ') };
      }

      function createMaze(size = 8) {
        const grid = Array.from({ length: size }, () =>
          Array.from({ length: size }, () => ({ top: true, right: true, bottom: true, left: true, visited: false }))
        );
        const stack = [[0, 0]];
        grid[0][0].visited = true;
        const dirs = [
          [0, -1, 'top', 'bottom'],
          [1, 0, 'right', 'left'],
          [0, 1, 'bottom', 'top'],
          [-1, 0, 'left', 'right']
        ];

        while (stack.length) {
          const [x, y] = stack[stack.length - 1];
          const neighbors = dirs
            .map(([dx, dy, wall, opposite]) => ({ nx: x + dx, ny: y + dy, wall, opposite }))
            .filter(({ nx, ny }) => nx >= 0 && ny >= 0 && nx < size && ny < size && !grid[ny][nx].visited);

          if (!neighbors.length) {
            stack.pop();
            continue;
          }

          const next = neighbors[randInt(neighbors.length)];
          grid[y][x][next.wall] = false;
          grid[next.ny][next.nx][next.opposite] = false;
          grid[next.ny][next.nx].visited = true;
          stack.push([next.nx, next.ny]);
        }

        return grid.map((row) =>
          row.map((cell) => ({
            top: cell.top,
            right: cell.right,
            bottom: cell.bottom,
            left: cell.left
          }))
        );
      }

      function createJigsawPieces() {
        return Array.from({ length: 9 }, (_, i) => i).sort(() => Math.random() - 0.5);
      }

      function stripCodeFences(raw) {
        if (!raw || typeof raw !== 'string') return '';
        return raw.replace(/```json/gi, '').replace(/```/g, '').trim();
      }

      function parseClaudeJson(raw) {
        const cleaned = stripCodeFences(raw);
        try {
          return JSON.parse(cleaned);
        } catch (err) {
          const startObj = cleaned.indexOf('{');
          const endObj = cleaned.lastIndexOf('}');
          const startArr = cleaned.indexOf('[');
          const endArr = cleaned.lastIndexOf(']');

          const candidates = [];
          if (startObj !== -1 && endObj !== -1 && endObj > startObj) {
            candidates.push(cleaned.slice(startObj, endObj + 1));
          }
          if (startArr !== -1 && endArr !== -1 && endArr > startArr) {
            candidates.push(cleaned.slice(startArr, endArr + 1));
          }

          for (const c of candidates) {
            try {
              return JSON.parse(c);
            } catch (_) {}
          }
          throw err;
        }
      }

      function getClaudeText(payload) {
        if (!payload || !Array.isArray(payload.content)) return '';
        return payload.content
          .filter((block) => block && block.type === 'text')
          .map((block) => block.text || '')
          .join('\n')
          .trim();
      }

      async function callClaude({ apiKey, system, messages, maxTokens = 1000, temperature = 0.9 }) {
        const cleanKey = String(apiKey || '').trim();
        if (!cleanKey) {
          throw new Error('Missing Anthropic API key.');
        }
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'content-type': 'application/json'
          },
          body: JSON.stringify({
            apiKey: cleanKey,
            model: MODEL,
            max_tokens: maxTokens,
            temperature,
            system,
            messages
          })
        });

        const rawPayload = await response.text();
        let payload = null;
        try {
          payload = rawPayload ? JSON.parse(rawPayload) : {};
        } catch (_) {
          payload = { message: rawPayload || 'Unexpected non-JSON response from proxy.' };
        }

        if (!response.ok) {
          const message =
            (typeof payload?.error === 'string' && payload.error) ||
            payload?.error?.message ||
            payload?.message ||
            'Claude request failed.';
          throw new Error(message);
        }

        return getClaudeText(payload);
      }

      function badgeColor(personality) {
        const text = (personality || '').toLowerCase();
        if (text.includes('charmer') || text.includes('social')) return 'bg-emerald-700/50 text-emerald-100';
        if (text.includes('mastermind') || text.includes('strateg')) return 'bg-amber-700/50 text-amber-100';
        if (text.includes('wild')) return 'bg-orange-700/50 text-orange-100';
        if (text.includes('loyal')) return 'bg-cyan-700/50 text-cyan-100';
        return 'bg-zinc-700/60 text-zinc-100';
      }

      function App() {
        const [phase, setPhase] = useState('dev');
        const [apiKeyInput, setApiKeyInput] = useState('');
        const [apiKey, setApiKey] = useState('');

        const [playerNameInput, setPlayerNameInput] = useState('');
        const [playerOccupationInput, setPlayerOccupationInput] = useState('');
        const [playerName, setPlayerName] = useState('');
        const [playerOccupation, setPlayerOccupation] = useState('');
        const [playerHasImmunity, setPlayerHasImmunity] = useState(false);

        const [immunityType, setImmunityType] = useState('sliding');
        const [immunityCountdown, setImmunityCountdown] = useState(3);
        const [immunityTimer, setImmunityTimer] = useState(0);
        const [immunityResult, setImmunityResult] = useState(null);
        const [immunityGivenUp, setImmunityGivenUp] = useState(false);
        const [immunityPepTalk, setImmunityPepTalk] = useState('');
        const [immunityPepLoading, setImmunityPepLoading] = useState(false);
        const [immuneCastawayName, setImmuneCastawayName] = useState('');
        const [castawayRaceProgress, setCastawayRaceProgress] = useState({});
        const [castawayRaceWinner, setCastawayRaceWinner] = useState('');

        const [slidingBoard, setSlidingBoard] = useState(createSlidingBoard());
        const [memoryDeck, setMemoryDeck] = useState(createMemoryDeck());
        const [memoryFlipped, setMemoryFlipped] = useState([]);
        const [cipherData, setCipherData] = useState(createCipherChallenge());
        const [cipherGuess, setCipherGuess] = useState('');
        const [mazeGrid, setMazeGrid] = useState(createMaze(8));
        const [mazePos, setMazePos] = useState({ x: 0, y: 0 });
        const [jigsawPieces, setJigsawPieces] = useState(createJigsawPieces());
        const [jigsawSelected, setJigsawSelected] = useState(null);

        const [castaways, setCastaways] = useState([]);
        const [selectedCastawayId, setSelectedCastawayId] = useState(null);
        const [conversationHistories, setConversationHistories] = useState({});
        const [campfireHistory, setCampfireHistory] = useState([]);
        const [conversationInput, setConversationInput] = useState('');
        const [chatMode, setChatMode] = useState('oneOnOne');
        const [campfireInvites, setCampfireInvites] = useState([]);

        const [generatingCastaways, setGeneratingCastaways] = useState(false);
        const [chatInFlight, setChatInFlight] = useState(false);
        const [error, setError] = useState('');

        const [tribalSelection, setTribalSelection] = useState('');
        const [votes, setVotes] = useState([]);
        const [revealedVotesCount, setRevealedVotesCount] = useState(0);
        const [tribalStarted, setTribalStarted] = useState(false);
        const [eliminatedName, setEliminatedName] = useState('');
        const [tribalHostOpening, setTribalHostOpening] = useState('');
        const [tribalHostLoading, setTribalHostLoading] = useState(false);
        const [tribalPublicHistory, setTribalPublicHistory] = useState([]);
        const [tribalChatInput, setTribalChatInput] = useState('');
        const [tribalPlayerMessages, setTribalPlayerMessages] = useState(0);
        const [tribalVoteCalled, setTribalVoteCalled] = useState(false);

        const [revealLoading, setRevealLoading] = useState(false);
        const [revealData, setRevealData] = useState(null);

        const [notifyEmail, setNotifyEmail] = useState('');
        const [notifyMessage, setNotifyMessage] = useState('');

        const waitingIntervalsRef = useRef({});
        const typingIntervalsRef = useRef({});
        const voteTimerRef = useRef(null);
        const chatScrollRef = useRef(null);
        const tribalScrollRef = useRef(null);

        const selectedCastaway = useMemo(
          () => castaways.find((c) => c.id === selectedCastawayId) || null,
          [castaways, selectedCastawayId]
        );
        const selectedHistory = useMemo(
          () => (selectedCastawayId ? conversationHistories[selectedCastawayId] || [] : []),
          [conversationHistories, selectedCastawayId]
        );
        const activeHistory = useMemo(
          () => (chatMode === 'campfire' ? campfireHistory : selectedHistory),
          [chatMode, campfireHistory, selectedHistory]
        );
        const invitedCastawayNames = useMemo(
          () => castaways.filter((c) => campfireInvites.includes(c.id)).map((c) => c.name),
          [castaways, campfireInvites]
        );

        const shownVotes = useMemo(() => votes.slice(0, revealedVotesCount), [votes, revealedVotesCount]);

        useEffect(() => {
          return () => {
            Object.values(waitingIntervalsRef.current).forEach((id) => clearInterval(id));
            Object.values(typingIntervalsRef.current).forEach((id) => clearInterval(id));
            if (voteTimerRef.current) clearInterval(voteTimerRef.current);
          };
        }, []);

        useEffect(() => {
          if (!chatScrollRef.current) return;
          chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
        }, [chatMode, selectedCastawayId, activeHistory.length, activeHistory[activeHistory.length - 1]?.text]);

        useEffect(() => {
          if (!tribalScrollRef.current) return;
          tribalScrollRef.current.scrollTop = tribalScrollRef.current.scrollHeight;
        }, [phase, tribalPublicHistory.length, tribalPublicHistory[tribalPublicHistory.length - 1]?.text]);

        useEffect(() => {
          if (phase !== 'tribal') return;
          if (tribalHostOpening || tribalHostLoading) return;
          loadTribalHostOpening();
        }, [phase, tribalHostOpening, tribalHostLoading]);

        useEffect(() => {
          if (phase !== 'immunity_intro') return;
          if (immunityCountdown <= 0) {
            setPhase('immunity_pep');
            setImmunityTimer(0);
            return;
          }
          const id = setTimeout(() => setImmunityCountdown((prev) => prev - 1), 1000);
          return () => clearTimeout(id);
        }, [phase, immunityCountdown]);

        useEffect(() => {
          if (phase !== 'immunity_pep') return;
          if (immunityPepTalk || immunityPepLoading) return;
          loadImmunityPepTalk();
        }, [phase, immunityPepTalk, immunityPepLoading]);

        useEffect(() => {
          if (phase !== 'immunity_puzzle') return;
          const id = setInterval(() => setImmunityTimer((prev) => prev + 1), 1000);
          return () => clearInterval(id);
        }, [phase]);

        useEffect(() => {
          if (phase !== 'immunity_puzzle') return;
          if (immunityResult || castawayRaceWinner) return;
          const id = setInterval(() => {
            setCastawayRaceProgress((prev) => {
              const next = { ...prev };
              let winner = '';
              for (const c of castaways) {
                const name = c.name;
                const p = Number(next[name] || 0);
                if (p >= 100) {
                  if (!winner) winner = name;
                  continue;
                }
                const personality = (c.personality || '').toLowerCase();
                let delta = 0.45 + Math.random() * 0.85;
                if (personality.includes('competitive') || personality.includes('challenge') || personality.includes('athlet')) {
                  delta *= 1.18;
                } else if (personality.includes('quiet') || personality.includes('analytical') || personality.includes('observant')) {
                  delta *= 1.02;
                } else if (personality.includes('social') || personality.includes('charmer') || personality.includes('bubbly')) {
                  delta *= p < 35 ? 0.78 : 1.12;
                }
                if (p > 70 && Math.random() < 0.24) delta *= 0.45;
                if (Math.random() < 0.07) delta *= 1.35;
                const nextP = Math.min(100, p + delta);
                next[name] = nextP;
                if (nextP >= 100 && !winner) winner = name;
              }
              if (winner && !castawayRaceWinner) {
                setCastawayRaceWinner(winner);
              }
              return next;
            });
          }, 350);
          return () => clearInterval(id);
        }, [phase, castaways, immunityResult, castawayRaceWinner]);

        useEffect(() => {
          if (phase !== 'immunity_puzzle') return;
          if (!castawayRaceWinner) return;
          completeImmunityChallenge(false, { castawayWinner: castawayRaceWinner });
        }, [phase, castawayRaceWinner]);

        useEffect(() => {
          if (phase !== 'immunity_result' || !immunityResult?.castawayWinner) return;
          const id = setTimeout(() => setPhase('convo'), 2600);
          return () => clearTimeout(id);
        }, [phase, immunityResult]);

        useEffect(() => {
          if (phase !== 'immunity_puzzle' || immunityType !== 'memory') return;
          if (memoryFlipped.length !== 2) return;
          const [a, b] = memoryFlipped;
          const same = memoryDeck[a]?.key && memoryDeck[a].key === memoryDeck[b]?.key;
          const id = setTimeout(() => {
            setMemoryDeck((prev) =>
              prev.map((card, idx) => {
                if (idx !== a && idx !== b) return card;
                return same ? { ...card, matched: true, flipped: true } : { ...card, flipped: false };
              })
            );
            setMemoryFlipped([]);
          }, 500);
          return () => clearTimeout(id);
        }, [phase, immunityType, memoryFlipped, memoryDeck]);

        useEffect(() => {
          if (phase !== 'immunity_puzzle' || immunityType !== 'memory') return;
          if (memoryDeck.length && memoryDeck.every((c) => c.matched)) {
            completeImmunityChallenge(true);
          }
        }, [phase, immunityType, memoryDeck]);

        useEffect(() => {
          if (phase !== 'immunity_puzzle' || immunityType !== 'maze') return;
          const onKeyDown = (e) => {
            const key = e.key.toLowerCase();
            const map = {
              arrowup: [0, -1, 'top'],
              w: [0, -1, 'top'],
              arrowright: [1, 0, 'right'],
              d: [1, 0, 'right'],
              arrowdown: [0, 1, 'bottom'],
              s: [0, 1, 'bottom'],
              arrowleft: [-1, 0, 'left'],
              a: [-1, 0, 'left']
            };
            if (!map[key]) return;
            e.preventDefault();
            const [dx, dy, wall] = map[key];
            setMazePos((prev) => {
              const cell = mazeGrid[prev.y][prev.x];
              if (cell[wall]) return prev;
              const next = { x: prev.x + dx, y: prev.y + dy };
              if (next.x === 7 && next.y === 7) {
                completeImmunityChallenge(true);
              }
              return next;
            });
          };
          window.addEventListener('keydown', onKeyDown);
          return () => window.removeEventListener('keydown', onKeyDown);
        }, [phase, immunityType, mazeGrid]);

        function setupImmunityChallenge(type, participants = castaways) {
          setImmunityType(type);
          setImmunityCountdown(3);
          setImmunityTimer(0);
          setImmunityResult(null);
          setImmunityGivenUp(false);
          setImmunityPepTalk('');
          setImmunityPepLoading(false);
          setImmuneCastawayName('');
          setCastawayRaceWinner('');
          setCastawayRaceProgress(
            participants.reduce((acc, c) => {
              acc[c.name] = 0;
              return acc;
            }, {})
          );
          setSlidingBoard(createSlidingBoard());
          setMemoryDeck(createMemoryDeck());
          setMemoryFlipped([]);
          setCipherData(createCipherChallenge());
          setCipherGuess('');
          setMazeGrid(createMaze(8));
          setMazePos({ x: 0, y: 0 });
          setJigsawPieces(createJigsawPieces());
          setJigsawSelected(null);
          setPhase('immunity_intro');
        }

        async function loadImmunityPepTalk() {
          setImmunityPepLoading(true);
          try {
            const system = `You are Jeff Probst delivering a Survivor-style immunity challenge pep talk.

Rules:
- 2-3 sentences.
- Bold, theatrical, high-stakes.
- Reference the player's name and occupation.
- Reference the specific challenge type.
- Build tension and urgency.
- End with a rallying line (for example "Survivors ready?" or equivalent).
- Return plain text only.`;

            const prompt = `Player name: ${playerName}
Player occupation: ${playerOccupation}
Challenge type: ${CHALLENGE_META[immunityType]?.name || immunityType}

Write a unique pep talk now.`;

            const text = await callClaude({
              apiKey,
              system,
              messages: [{ role: 'user', content: prompt }],
              maxTokens: 1000,
              temperature: 1
            });
            setImmunityPepTalk(
              text ||
                `${playerName}, this is ${CHALLENGE_META[immunityType]?.name || 'the challenge'} and tonight it decides whether you're protected or exposed. Outplay this puzzle and nobody can write your name down. Survivors ready?`
            );
          } catch (err) {
            setImmunityPepTalk(
              `${playerName}, as a ${playerOccupation}, you know pressure finds every weak point. One challenge decides whether you're safe or vulnerable tonight. This is Survivor.`
            );
            setError(err.message || 'Failed to load challenge pep talk.');
          } finally {
            setImmunityPepLoading(false);
          }
        }

        function completeImmunityChallenge(solved, options = {}) {
          if (phase !== 'immunity_puzzle') return;
          const castawayWinner = options.castawayWinner || '';
          const par = CHALLENGE_META[immunityType].par;
          let won = solved && immunityTimer <= par && !immunityGivenUp && !castawayWinner;
          let winnerName = castawayWinner;
          if (!won && !winnerName) {
            const leader = Object.entries(castawayRaceProgress).sort((a, b) => b[1] - a[1])[0]?.[0] || castaways[0]?.name || '';
            winnerName = leader;
          }
          setPlayerHasImmunity(won);
          setImmuneCastawayName(won ? '' : winnerName);
          if (!won && winnerName) {
            setCastawayRaceWinner(winnerName);
            setCastawayRaceProgress((prev) => ({ ...prev, [winnerName]: 100 }));
          }
          setImmunityResult({ solved, won, time: immunityTimer, castawayWinner: won ? '' : winnerName });
          setPhase('immunity_result');
        }

  "responses": [{ "speaker": "Host or CastawayName", "text": "" }],
  "callVote": false,
  "hostClosingLine": ""
}`;

            const prompt = `Player name: ${playerName}
Player occupation: ${playerOccupation}
Player immunity status: ${playerHasImmunity ? 'Won immunity (safe tonight)' : 'No immunity (vulnerable tonight)'}
Immune castaway tonight: ${immuneCastawayName || 'none'}
Player message count so far: ${nextPlayerCount}
Castaway profiles:
${JSON.stringify(castawayContext, null, 2)}

1-on-1 histories:
${JSON.stringify(oneOnOneHistory, null, 2)}

Campfire history:
${JSON.stringify(campfireContext, null, 2)}

Tribal conversation thread so far:
${JSON.stringify(tribalHistoryForPrompt, null, 2)}

Decision rules:
- Choose who responds naturally right now (usually 2-4 total lines).
- callVote should become true once tension peaks, typically after 4-6 player messages.
- Must set callVote true by player message 6 at the latest.
- If callVote is true, include a strong Host closing line calling for the vote.`;

            const raw = await callClaude({
              apiKey,
              system,
              messages: [{ role: 'user', content: prompt }],
              maxTokens: 1000,
              temperature: 0.95
            });

            const parsed = parseClaudeJson(raw);
            const validNames = new Set(castaways.map((c) => c.name));
            const responses = Array.isArray(parsed?.responses)
              ? parsed.responses
                  .map((r) => ({
                    speaker: String(r?.speaker || '').trim(),
                    text: String(r?.text || '').trim()
                  }))
                  .filter(
                    (r) => r.speaker && r.text && (r.speaker === 'Host' || validNames.has(r.speaker))
                  )
              : [];

            let callVote = Boolean(parsed?.callVote);
            let hostClosingLine = String(parsed?.hostClosingLine || '').trim();
            if (nextPlayerCount < 4) callVote = false;
            if (nextPlayerCount >= 6) callVote = true;
            if (callVote && !hostClosingLine) {
              hostClosingLine = 'Enough. The lines are drawn, and it is time to vote.';
            }

            for (let i = 0; i < responses.length; i += 1) {
              const msg = responses[i];
              const messageId = `tr-${Date.now()}-${i}`;
              setTribalPublicHistory((prev) => [
                ...prev,
                {
                  id: messageId,
                  role: msg.speaker === 'Host' ? 'host' : 'castaway',
                  speaker: msg.speaker,
                  text: '',
                  typing: true
                }
              ]);
              await animateTribalReply(messageId, msg.text);
              if (i < responses.length - 1) {
                await new Promise((resolve) => setTimeout(resolve, 450));
              }
            }

            if (callVote) {
              const hostId = `tvote-${Date.now()}`;
              setTribalPublicHistory((prev) => [
                ...prev,
                { id: hostId, role: 'host', speaker: 'Host', text: '', typing: true }
              ]);
              await animateTribalReply(hostId, hostClosingLine);
              setTribalVoteCalled(true);
            }
          } catch (err) {
            setError(err.message || 'Tribal conversation failed.');
          } finally {
            setChatInFlight(false);
          }
        }

        async function runTribalCouncil(selectedVote) {
          const voteTarget = selectedVote || tribalSelection;
          if (!voteTarget || tribalStarted) return;
          setError('');
          setTribalStarted(true);
          setTribalSelection(voteTarget);
          setVotes([]);
          setRevealedVotesCount(0);
          setEliminatedName('');
          setRevealData(null);

          try {
            const voteTargetNames = [
              ...castaways.map((c) => c.name).filter((name) => name !== immuneCastawayName),
              ...(playerHasImmunity ? [] : [playerName])
            ];
            const castawayData = castaways.map((c) => ({
              name: c.name,
              personality: c.personality,
              hiddenAgenda: c.hiddenAgenda,
              secretAlliances: c.secretAlliances,
              canVoteForPlayer: !playerHasImmunity,
              conversationWithPlayer: (conversationHistories[c.id] || []).map((m) => ({
                role: m.role,
                text: m.text
              }))
            }));

            const system =
              'You simulate strategic Survivor-style voting behavior. Return strict JSON only. No markdown.';
            const userPrompt = `Player name: ${playerName}
Player occupation: ${playerOccupation}
Player immunity status: ${playerHasImmunity ? 'Won immunity (cannot be voted out)' : 'No immunity (can be voted out)'}
Immune castaway tonight: ${immuneCastawayName || 'none'}
Player voted for: ${voteTarget}
Eligible vote targets: ${JSON.stringify(voteTargetNames)}

Castaway data:
${JSON.stringify(castawayData, null, 2)}

Task:
Simulate how the 5 castaways voted at tribal council based on hidden agendas, alliances, and player conversations.
Return ONLY JSON in this exact format:
[
  { "name": "", "votedFor": "" }
]
Rules:
- Exactly 5 vote objects.
- name must be each castaway exactly once.
- votedFor must be one of the eligible vote target names.
- votedFor cannot be themselves.
- If player has immunity, no vote can be for "${playerName}".
- If a castaway has immunity, no vote can be for that castaway.
- No extra keys.
- Valid JSON only.`;

            const rawVotes = await callClaude({
              apiKey,
              system,
              messages: [{ role: 'user', content: userPrompt }],
              maxTokens: 2000,
              temperature: 0.9
            });

            const parsedVotes = parseClaudeJson(rawVotes);
            if (!Array.isArray(parsedVotes) || parsedVotes.length !== 5) {
              throw new Error('Vote simulation returned invalid data.');
            }

            const validVoters = new Set(castaways.map((c) => c.name));
            const validTargets = new Set(voteTargetNames);
            const normalizedVotes = parsedVotes
              .map((v) => ({
                name: String(v?.name || '').trim(),
                votedFor: String(v?.votedFor || '').trim()
              }))
              .filter((v) => validVoters.has(v.name) && validTargets.has(v.votedFor) && v.name !== v.votedFor)
              .filter((v) => (playerHasImmunity ? v.votedFor !== playerName : true));

            if (normalizedVotes.length !== 5) {
              throw new Error('Claude vote output failed validation.');
            }

            setVotes(normalizedVotes);

            let revealIndex = 0;
            voteTimerRef.current = setInterval(() => {
              revealIndex += 1;
              setRevealedVotesCount(revealIndex);
              if (revealIndex >= normalizedVotes.length) {
                clearInterval(voteTimerRef.current);
                voteTimerRef.current = null;

                const tally = {};
                for (const v of normalizedVotes) {
                  tally[v.votedFor] = (tally[v.votedFor] || 0) + 1;
                }
                tally[voteTarget] = (tally[voteTarget] || 0) + 1;

                const eliminated = Object.entries(tally).sort((a, b) => b[1] - a[1])[0]?.[0] || voteTarget;
                setEliminatedName(eliminated);
              }
            }, 1500);
          } catch (err) {
            setError(err.message || 'Tribal council failed.');
            setTribalStarted(false);
          }
        }

${JSON.stringify(payload, null, 2)}

Return ONLY JSON with this shape:
{

- narrative should be dramatic but concise (4-7 sentences).
- Valid JSON only.`;

              const raw = await callClaude({

                messages: [{ role: 'user', content: prompt }],

              });

              const parsed = parseClaudeJson(raw);

              const normalized = {

                      name: String(t?.name || '').trim(),

                verdict: String(parsed.verdict || '').trim(),
                rightMove: Boolean(parsed.rightMove)

                thoughts: castaways.map((c) => ({

                verdict:
                  `It was a defensible move, but your influence was obvious and that will raise your threat level next round. Your ${playerOccupation || 'background'} helped in credibility with some players, but also made you easier to profile socially.`,
                rightMove: true
              });
              setError(err.message || 'Reveal generation failed; fallback used.');
            } finally {
              setRevealLoading(false);
              setPhase('reveal');
            }
          }

          buildReveal();

                                style={{
                                  backgroundImage:
                                    'radial-gradient(circle at 20% 20%, rgba(251,191,36,0.85) 0%, rgba(251,191,36,0.0) 45%), radial-gradient(circle at 80% 25%, rgba(245,158,11,0.8) 0%, rgba(245,158,11,0.0) 40%), linear-gradient(135deg, #4a1d08 0%, #7c2d12 45%, #451a03 100%), repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 9px)',
                                  backgroundSize: '300% 300%, 300% 300%, 300% 300%, 300% 300%',
                                  backgroundPosition: `${bgCol * 50}% ${bgRow * 50}%, ${bgCol * 50}% ${bgRow * 50}%, ${bgCol * 50}% ${bgRow * 50}%, ${bgCol * 50}% ${bgRow * 50}%`
                                }}
                                title={`R${row}C${col}`}
                              />
                            </button>
                          );
                        })}
                      </div>
                    )}

                    <div className="mx-auto mt-6 w-full max-w-3xl rounded-2xl border border-amber-300/30 bg-black/35 p-4">
                      <div className="text-xs uppercase tracking-[0.2em] text-amber-200">Live Competitors</div>
                      <div className="mt-3 space-y-3">
                        {castaways.map((c) => {
                          const progress = Math.max(0, Math.min(100, castawayRaceProgress[c.name] || 0));
                          const isWinner = castawayRaceWinner === c.name;
                          return (
                            <div key={`race-${c.id}`}>
                              <div className={`mb-1 flex items-center justify-between text-xs ${isWinner ? 'text-yellow-200' : 'text-zinc-300'}`}>
                                <span>{c.name}</span>
                                <span>{Math.floor(progress)}%</span>
                              </div>
                              <div className="h-2 overflow-hidden rounded-full bg-zinc-800">
                                <div
                                  className={`h-full rounded-full transition-all duration-300 ${
                                    isWinner ? 'bg-yellow-300' : 'bg-amber-400/80'
                                  }`}
                                  style={{ width: `${progress}%` }}
                                />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      {castawayRaceWinner && (
                        <div className="mt-4 rounded-xl border border-yellow-300/50 bg-yellow-700/20 px-3 py-2 text-center text-sm font-semibold text-yellow-100 animate-flicker">
                          {castawayRaceWinner} wins immunity
                        </div>
                      )}
                    </div>

                    <div className="mt-6 flex justify-center">
                      <button
                        onClick={giveUpImmunityChallenge}
                        className="rounded-xl border border-red-400/50 bg-red-900/30 px-4 py-2 text-sm font-semibold text-red-100"
                      >
                        Give Up
                      </button>
                    </div>
                  </div>
                </section>
              )}

              {phase === 'immunity_result' && immunityResult && (
                <section className="mx-auto max-w-3xl animate-fadeIn">
                  <div className="rounded-3xl border border-amber-300/45 bg-black/60 p-8 text-center">
                    <h2 className="font-display text-5xl tracking-wide text-amber-100">
                      {immunityResult.won
                        ? '🏆 You won immunity'
                        : immunityResult.castawayWinner
                        ? `🏆 ${immunityResult.castawayWinner} wins immunity`
                        : '💀 You lost immunity'}
                    </h2>
                    <p className="mt-3 text-sm text-zinc-200">
                      {immunityResult.won
                        ? 'You cannot be voted out tonight.'
                        : immunityResult.castawayWinner
                        ? `You are vulnerable. ${immunityResult.castawayWinner} is safe tonight.`
                        : 'You are vulnerable at tribal council.'}
                    </p>
                    <p className="mt-2 text-xs text-zinc-400">
                      Time: {immunityResult.time}s / Par: {CHALLENGE_META[immunityType].par}s
                    </p>
                    {!immunityResult.castawayWinner && (
                      <button
                        onClick={() => setPhase('convo')}
                        className="mt-6 rounded-xl bg-gradient-to-r from-emerald-500 to-lime-500 px-5 py-3 text-sm font-bold text-zinc-950"
                      >
                        Continue to Camp
                      </button>
                    )}
                  </div>
                </section>
              )}

              {phase === 'convo' && (
                <section className="space-y-6 animate-fadeIn">
                  <div className="flex flex-wrap items-center justify-between gap-3">
                    <h2 className="font-display text-4xl tracking-wide text-emerald-200">Phase 2: Tribe Conversations</h2>
                  </div>

                  <div className="flex items-center gap-2">
                    <button
                      onClick={() => setChatMode('oneOnOne')}
                      className={`rounded-full px-4 py-2 text-sm font-semibold transition ${
                        chatMode === 'oneOnOne'
                          ? 'bg-orange-500 text-zinc-950'
                          : 'border border-zinc-700 bg-black/40 text-zinc-300 hover:border-zinc-500'
                      }`}
                    >
                      1-on-1
                    </button>
                    <button
                      onClick={() => setChatMode('campfire')}
                      className={`rounded-full px-4 py-2 text-sm font-semibold transition ${
                        chatMode === 'campfire'
                          ? 'bg-orange-500 text-zinc-950'
                          : 'border border-zinc-700 bg-black/40 text-zinc-300 hover:border-zinc-500'
                      }`}
                    >
                      Campfire 🔥
                    </button>
                  </div>

                  <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                    <div className="rounded-2xl border border-emerald-300/60 bg-emerald-900/20 p-4 text-left shadow-lg shadow-emerald-700/15">
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          <div className="flex items-center gap-2">
                            <h3 className="text-xl font-semibold text-zinc-100">{playerName || 'You'}</h3>
                            <span className="rounded-full bg-emerald-500/20 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-emerald-100">
                              You
                            </span>
                          </div>
                          <p className="mt-1 text-sm text-zinc-300">{playerOccupation || 'Player'}</p>
                        </div>
                      </div>
                      <span className="mt-3 inline-block rounded-full bg-emerald-700/50 px-3 py-1 text-xs font-medium text-emerald-100">
                        Human wildcard
                      </span>
                    </div>
                    {castaways.map((c) => (
                      <div
                        key={c.id}
                        onClick={() => setSelectedCastawayId(c.id)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            setSelectedCastawayId(c.id);
                          }
                        }}
                        role="button"
                        tabIndex={0}
                        className={`rounded-2xl border p-4 text-left transition ${
                          selectedCastawayId === c.id
                            ? 'border-orange-300/60 bg-orange-700/20 shadow-lg shadow-orange-500/20'
                            : 'border-zinc-700/70 bg-black/40 hover:border-emerald-300/50 hover:bg-emerald-800/10'
                        } ${chatMode === 'campfire' && campfireInvites.includes(c.id) ? 'ring-2 ring-emerald-300/70' : ''}`}
                      >
                        <div className="flex items-start justify-between gap-2">
                          <div className="min-w-0">
                            <div className="flex items-center gap-2">
                              <h3 className="text-xl font-semibold text-zinc-100">{c.name}</h3>
                              {chatMode === 'campfire' && campfireInvites.includes(c.id) && (
                                <span className="rounded-full bg-emerald-500/20 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-emerald-100">
                                  Invited
                                </span>
                              )}
                            </div>
                            <p className="mt-1 text-sm text-zinc-300">{c.occupation}</p>
                          </div>
                          <span className="text-sm text-zinc-300">{c.age}</span>
                        </div>
                        <span
                          className={`mt-3 inline-block rounded-full px-3 py-1 text-xs font-medium ${badgeColor(
                            c.personality
                          )}`}
                        >
                          {c.personality}
                        </span>
                        {chatMode === 'campfire' && (
                          <div className="mt-3">
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                toggleCampfireInvite(c.id);
                              }}
                              className={`rounded-lg px-3 py-1.5 text-xs font-semibold transition ${
                                campfireInvites.includes(c.id)
                                  ? 'bg-emerald-500/30 text-emerald-100'
                                  : 'border border-zinc-600 bg-black/30 text-zinc-200 hover:border-zinc-400'
                              }`}
                            >
                              {campfireInvites.includes(c.id) ? 'Invited ✓' : 'Invite'}
                            </button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>

                  <div className="grid grid-cols-1 gap-4 lg:grid-cols-[1.2fr_0.8fr]">
                    <div className="rounded-2xl border border-zinc-700/60 bg-black/45 p-4">
                      <h3 className="mb-3 text-lg font-semibold text-orange-200">
                        {chatMode === 'campfire'
                          ? 'Campfire'
                          : selectedCastaway
                          ? `1-on-1 with ${selectedCastaway.name}`
                          : 'Select a castaway'}
                      </h3>
                      {chatMode === 'campfire' && (
                        <div className="mb-3 rounded-xl border border-zinc-700/70 bg-zinc-950/60 px-3 py-2 text-sm text-zinc-300">
                          {invitedCastawayNames.length > 0
                            ? `Invited: ${invitedCastawayNames.join(', ')}`
                            : 'Open Campfire'}
                        </div>
                      )}

                      <div
                        ref={chatScrollRef}
                        className="h-80 space-y-3 overflow-y-auto rounded-xl border border-zinc-800/70 bg-zinc-950/60 p-3"
                      >
                        {chatMode !== 'campfire' && selectedCastaway && selectedHistory.length === 0 && (
                          <p className="text-sm text-zinc-500">
                            Start talking. Read between the lines; everyone is playing a game.
                          </p>
                        )}
                        {chatMode === 'campfire' && campfireHistory.length === 0 && (
                          <p className="text-sm text-zinc-500">
                            Bring people in or keep it open. Every response lands in front of everyone.
                          </p>
                        )}

                        {(chatMode === 'campfire' ? campfireHistory : selectedHistory).map((m) => (
                            <div
                              key={m.id}
                              className={`max-w-[85%] rounded-xl px-3 py-2 text-sm ${
                                m.role === 'user'
                                  ? 'ml-auto bg-emerald-700/45 text-emerald-50'
                                  : 'bg-orange-700/35 text-orange-50'
                              }`}
                            >
                              <div className="mb-1 text-[10px] uppercase tracking-wide text-zinc-300/90">
                                {m.role === 'user' ? playerName : m.speaker || selectedCastaway?.name}
                              </div>
                              <div className={m.typing ? 'font-medium animate-flicker' : ''}>{m.text}</div>
                            </div>
                          ))}
                      </div>

                      <div className="mt-3 flex gap-2">
                        <input
                          type="text"
                          value={conversationInput}
                          onChange={(e) => setConversationInput(e.target.value)}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') {
                              e.preventDefault();
                              if (chatMode === 'campfire') {
                                sendCampfireConversation();
                              } else {
                                sendConversation();
                              }
                            }
                          }}
                          disabled={(chatMode !== 'campfire' && !selectedCastaway) || chatInFlight}
                          placeholder={
                            chatMode === 'campfire'
                              ? 'Address the campfire...'
                              : selectedCastaway
                              ? `Ask ${selectedCastaway.name} something...`
                              : 'Pick a castaway first...'
                          }
                          className="flex-1 rounded-xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-sm outline-none ring-orange-300/0 transition focus:border-orange-300/70 focus:ring-2 disabled:cursor-not-allowed disabled:opacity-60"
                        />
                        <button
                          onClick={chatMode === 'campfire' ? sendCampfireConversation : sendConversation}
                          disabled={!canSendConversation}
                          className="rounded-xl bg-gradient-to-r from-orange-500 to-amber-500 px-4 py-3 text-sm font-semibold text-zinc-950 disabled:cursor-not-allowed disabled:opacity-50"
                        >
                          Send
                        </button>
                      </div>
                    </div>

                    <div className="rounded-2xl border border-zinc-700/60 bg-black/45 p-4">
                      <h3 className="text-lg font-semibold text-emerald-200">Briefing</h3>
                      <p className="mt-2 text-sm text-zinc-300">
                        Speak to whoever you want, for as long as you need. Everyone's hiding something. When you think you've figured it out - head to Tribal Council.
                      </p>
                      <button
                        onClick={openTribalPhase}
                        className="mt-5 w-full rounded-xl bg-gradient-to-r from-red-500 to-orange-500 px-4 py-3 text-sm font-bold text-zinc-100 animate-pulseGlow"
                      >
                        Head to Tribal Council 🔥
                      </button>
                    </div>
                  </div>
                </section>
              )}

              {phase === 'tribal' && (
                <section className="min-h-[62vh] animate-fadeIn">
                  <div className="mx-auto max-w-4xl rounded-3xl border border-orange-300/30 bg-black/75 p-6 backdrop-blur-md sm:p-8">
                    <h2 className="text-center font-display text-5xl tracking-wider text-orange-200">Tribal Council</h2>
                    <p className="mt-2 text-center text-sm text-zinc-300">
                      The torches are lit. Pick one castaway to vote out.
                    </p>

                    <div
                      ref={tribalScrollRef}
                      className="mt-6 max-h-[52vh] space-y-3 overflow-y-auto rounded-2xl border border-zinc-700/70 bg-zinc-950/50 p-4"
                    >
                      {tribalHostLoading && tribalPublicHistory.length === 0 && (
                        <div className="text-center italic text-amber-200 animate-flicker">
                          The fire pops as the host studies every face...
                        </div>
                      )}
                      {tribalPublicHistory.map((m) => (
                        <div key={m.id}>
                          {m.role === 'host' ? (
                            <div className="mx-auto max-w-[88%] text-center italic text-amber-200">
                              {m.typing ? <span className="animate-flicker">{m.text}</span> : m.text}
                            </div>
                          ) : m.role === 'player' ? (
                            <div className="ml-auto max-w-[85%] rounded-xl bg-emerald-700/45 px-3 py-2 text-sm text-emerald-50">
                              <div className="mb-1 text-[10px] uppercase tracking-wide text-zinc-300/90">{playerName}</div>
                              <div>{m.text}</div>
                            </div>
                          ) : (
                            <div className="max-w-[85%] rounded-xl bg-orange-700/35 px-3 py-2 text-sm text-orange-50">
                              <div className="mb-1 text-[10px] uppercase tracking-wide text-zinc-300/90">{m.speaker}</div>
                              <div className={m.typing ? 'animate-flicker' : ''}>{m.text}</div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>

                    {!tribalVoteCalled && !tribalStarted && (
                      <div className="mt-4">
                        <div className="mb-2 text-xs text-zinc-400">
                          Speak into the group. Anyone can jump in, and the host will call the vote when the moment is right.
                        </div>
                        <div className="flex gap-2">
                          <input
                            type="text"
                            value={tribalChatInput}
                            onChange={(e) => setTribalChatInput(e.target.value)}
                            onKeyDown={(e) => {
                              if (e.key === 'Enter') {
                                e.preventDefault();
                                sendTribalMessage();
                              }
                            }}
                            disabled={chatInFlight || tribalHostLoading}
                            placeholder="What do you say at tribal?"
                            className="flex-1 rounded-xl border border-zinc-700 bg-zinc-900/80 px-4 py-3 text-sm text-zinc-100 outline-none ring-orange-300/0 transition focus:border-orange-300/70 focus:ring-2 disabled:cursor-not-allowed disabled:opacity-60"
                          />
                          <button
                            onClick={sendTribalMessage}
                            disabled={!tribalChatInput.trim() || chatInFlight || tribalHostLoading}
                            className="rounded-xl bg-gradient-to-r from-orange-500 to-amber-500 px-4 py-3 text-sm font-semibold text-zinc-950 disabled:cursor-not-allowed disabled:opacity-60"
                          >
                            Send
                          </button>
                        </div>
                      </div>
                    )}

                    {tribalVoteCalled && !tribalStarted && (
                      <div className="mt-6 rounded-2xl border border-orange-300/30 bg-black/40 p-4 animate-fadeIn">
                        <div className="mb-3 text-center text-sm font-semibold uppercase tracking-widest text-orange-200">
                          Cast Your Vote
                        </div>
                        {playerHasImmunity && (
                          <div className="mb-3 text-center text-xs text-amber-200">
                            You hold immunity tonight and cannot be voted out.
                          </div>
                        )}
                        {immuneCastawayName && (
                          <div className="mb-3 text-center text-xs text-amber-200">
                            {immuneCastawayName} won immunity and cannot be voted out.
                          </div>
                        )}
                        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                          {[
                            ...castaways.map((c) => c.name).filter((name) => name !== immuneCastawayName),
                            ...(playerHasImmunity ? [] : [playerName])
                          ].map((name) => (
                            <label
                              key={name}
                              className={`flex cursor-pointer items-center justify-between rounded-xl border px-4 py-3 text-sm transition ${
                                tribalSelection === name
                                  ? 'border-orange-300 bg-orange-600/20 text-orange-100'
                                  : 'border-zinc-700 bg-zinc-900/55 text-zinc-200 hover:border-zinc-500'
                              }`}
                            >
                              <span>{name}</span>
                              <input
                                type="radio"
                                name="tribalVote"
                                checked={tribalSelection === name}
                                onChange={() => runTribalCouncil(name)}
                              />
                            </label>
                          ))}
                        </div>
                      </div>
                    )}

                    {tribalStarted && (
                      <div className="mt-8 space-y-3">
                        <h3 className="text-center text-lg font-semibold text-orange-100">Votes are being read...</h3>
                        <div className="mx-auto max-w-xl space-y-2">
                          {shownVotes.map((v, idx) => (
                            <div
                              key={`${v.name}-${idx}`}
                              className="rounded-xl border border-orange-300/25 bg-zinc-950/70 px-4 py-3 text-center text-sm animate-fadeIn"
                            >
                              <span className="text-zinc-300">{v.name} voted for </span>
                              <span className="font-semibold text-orange-200">{v.votedFor}</span>
                            </div>
                          ))}
                        </div>

                        {revealedVotesCount >= votes.length && eliminatedName && (
                          <div className="mt-6 rounded-2xl border border-red-300/40 bg-red-900/25 p-5 text-center animate-fadeIn">
                            <div className="text-sm uppercase tracking-widest text-red-200">Eliminated</div>
                            <div className="mt-2 font-display text-5xl tracking-wide text-red-100">{eliminatedName}</div>
                            <p className="mt-2 text-sm text-zinc-300">Your vote: {tribalSelection}</p>
                            <p className="mt-3 text-xs text-zinc-400">
                              Compiling the truth reveal dossier from every alliance and confession...
                            </p>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </section>
              )}

              {phase === 'reveal' && (
                <section className="animate-fadeIn">
                  <div className="mx-auto max-w-5xl rounded-3xl border border-amber-300/30 dossier p-6 sm:p-8">
                    <h2 className="font-display text-5xl tracking-wider text-amber-200">Truth Revealed</h2>

                    {revealLoading && (
                      <div className="mt-5 rounded-xl border border-zinc-700/70 bg-black/45 p-4 text-sm text-zinc-300 animate-flicker">
                        Opening sealed tribal dossier...
                      </div>
                    )}

                    {!revealLoading && revealData && (
                      <div className="mt-5 space-y-6">
                        <div className="rounded-2xl border border-amber-200/25 bg-black/40 p-4 text-sm leading-relaxed text-zinc-200">
                          {revealData.narrative}
                        </div>

                        <div>
                          <h3 className="mb-3 text-xl font-semibold text-orange-200">Hidden Agendas Exposed</h3>
                          <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
                            {castaways.map((c) => (
                              <div key={c.id} className="rounded-xl border border-zinc-700/70 bg-black/35 p-4">
                                <div className="text-sm font-semibold text-zinc-100">{c.name}</div>
                                <div className="mt-1 text-sm text-zinc-300">{c.hiddenAgenda}</div>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div>
                          <h3 className="mb-3 text-xl font-semibold text-orange-200">Secret Alliances Laid Bare</h3>
                          <div className="space-y-2">
                            {revealData.alliancesExposed.length > 0 ? (
                              revealData.alliancesExposed.map((a, idx) => (
                                <div key={idx} className="rounded-xl border border-zinc-700/70 bg-black/35 p-3 text-sm text-zinc-200">
                                  {a}
                                </div>
                              ))
                            ) : (
                              <div className="rounded-xl border border-zinc-700/70 bg-black/35 p-3 text-sm text-zinc-300">
                                No durable alliance held once the heat hit tribal.
                              </div>
                            )}
                          </div>
                        </div>

                        <div>
                          <h3 className="mb-3 text-xl font-semibold text-orange-200">What They Really Thought of You</h3>
                          <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
                            {revealData.thoughts.map((t, idx) => (
                              <div key={`${t.name}-${idx}`} className="rounded-xl border border-zinc-700/70 bg-black/35 p-4">
                                <div className="text-sm font-semibold text-zinc-100">{t.name}</div>
                                <div className="mt-1 text-sm text-zinc-300">{t.thought}</div>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className="rounded-2xl border border-amber-300/35 bg-amber-700/15 p-4">
                          <div className="text-xs uppercase tracking-widest text-amber-200">Verdict</div>
                          <div className="mt-2 text-sm text-zinc-100">{revealData.verdict}</div>
                          <div className="mt-2 text-sm font-semibold text-amber-100">
                            {revealData.rightMove ? 'You made the right move.' : 'You misread this tribal.'}
                          </div>
                        </div>

                        <button
                          onClick={() => setPhase('final')}
                          className="w-full rounded-xl bg-gradient-to-r from-emerald-500 to-lime-500 px-4 py-3 text-sm font-bold text-zinc-950"
                        >
                          Continue
                        </button>
                      </div>
                    )}
                  </div>
                </section>
              )}

              {phase === 'final' && (
                <section className="mx-auto mt-10 max-w-xl animate-fadeIn">
                  <div className="rounded-3xl border border-emerald-300/25 bg-black/55 p-6 text-center backdrop-blur">
                    <h2 className="font-display text-5xl tracking-wider text-emerald-200">You Survived Tribal Council</h2>
                    <p className="mt-3 text-sm text-zinc-300">Want to play the full season?</p>

                    <form onSubmit={submitNotify} className="mt-5 space-y-3">
                      <input
                        type="email"
                        value={notifyEmail}
                        onChange={(e) => setNotifyEmail(e.target.value)}
                        placeholder="you@example.com"
                        className="w-full rounded-xl border border-zinc-600/70 bg-zinc-950/80 px-4 py-3 text-sm outline-none ring-emerald-300/0 transition focus:border-emerald-300/70 focus:ring-2"
                      />
                      <button
                        type="submit"
                        className="w-full rounded-xl bg-gradient-to-r from-emerald-500 to-lime-500 px-4 py-3 text-sm font-bold text-zinc-950"
                      >
                        Notify Me
                      </button>
                    </form>

                    {notifyMessage && (
                      <div className="mt-4 rounded-xl border border-emerald-300/30 bg-emerald-900/20 px-4 py-3 text-sm text-emerald-100">
                        {notifyMessage}
                      </div>
                    )}
                  </div>
                </section>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
